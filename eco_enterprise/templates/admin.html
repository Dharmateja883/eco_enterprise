<h2>🌍 Reported Issues</h2>

<table border="1">
<tr>
  <th>ID</th>
  <th>Name</th>
  <th>Location</th>
  <th>Issue</th>
  <th>Status</th>
</tr>

{% for issue in issues %}
<tr>
  <td>{{ issue[0] }}</td>
  <td>{{ issue[1] }}</td>
  <td>{{ issue[2] }}</td>
  <td>{{ issue[3] }}</td>
  <td>{{ issue[5] }}</td>
</tr>
{% endfor %}
</table>
